{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0">Register for {{ event.name }}</h4>
            </div>
            <div class="card-body p-4">
                <div class="alert alert-info bg-light border-0 mb-4">
                    <strong>Event Details:</strong><br>
                    <span>📅 {{ event.date }} at {{ event.time }}</span><br>
                    <span>📍 {{ event.location }}</span>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label fw-bold">Full Name</label>
                        <input type="text" class="form-control focus-ring" id="name" name="name" required
                            placeholder="John Doe">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold">Email Address</label>
                        <input type="email" class="form-control focus-ring" id="email" name="email" required
                            placeholder="john@example.com">
                    </div>
                    <div class="mb-4">
                        <label for="phone" class="form-label fw-bold">Phone Number</label>
                        <input type="tel" class="form-control focus-ring" id="phone" name="phone" required
                            placeholder="+1234567890">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold">Confirm Registration</button>
                        <a href="{{ url_for('events') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
